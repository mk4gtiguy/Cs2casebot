<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐉 Dragon Tiger — CS2CaseBot</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Serif:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080408;--dragon:#ff3333;--tiger:#ffd700;--tie:#22c55e;--font:'Orbitron',monospace;}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#e8d8c8;}
body{background-image:radial-gradient(ellipse 60% 40% at 20% 50%,rgba(255,51,51,0.05),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 50%,rgba(255,215,0,0.05),transparent 60%);}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(8,4,8,0.98);border-bottom:1px solid rgba(255,215,0,0.12);position:sticky;top:0;z-index:50;}
.back{display:flex;align-items:center;gap:5px;color:#3a2a2a;font-size:10px;letter-spacing:1px;text-decoration:none;transition:color .2s;}
.back:hover{color:var(--tiger);}
.back svg{width:14px;height:14px;}
.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,var(--dragon),var(--tiger));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.bal{font-size:13px;font-weight:700;color:var(--tiger);font-family:monospace;}
.page{max-width:440px;margin:0 auto;padding:16px 14px 80px;}

/* ARENA */
.arena{display:grid;grid-template-columns:1fr 60px 1fr;gap:0;margin-bottom:16px;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
.side{padding:20px 12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;}
.dragon-side{background:rgba(255,51,51,0.06);}
.tiger-side{background:rgba(255,215,0,0.04);}
.vs-col{background:rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.vs-text{font-size:10px;font-weight:900;letter-spacing:1px;color:#3a2a1a;}
.vs-pipe{width:1px;height:30px;background:rgba(255,255,255,0.08);}

/* FACTION ICON */
.faction-icon{font-size:36px;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));}
.faction-name{font-size:11px;font-weight:900;letter-spacing:2px;}
.dragon-side .faction-name{color:var(--dragon);}
.tiger-side .faction-name{color:var(--tiger);}

/* CARD SLOTS */
.card-slot{width:70px;height:98px;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;}
.card-slot.empty{background:rgba(255,255,255,0.03);border:2px dashed rgba(255,255,255,0.08);}
.dt-card{width:70px;height:98px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,0.5);position:relative;}
.dt-card.face{background:linear-gradient(135deg,#fff,#f4f4f4);}
.dt-card.face-red{background:linear-gradient(135deg,#fff,#f4f4f4);color:#cc0000;}
.dt-card.face{color:#111;}
.dt-card.hidden{background:linear-gradient(135deg,#1a0a0a,#2a1010);border:1px solid rgba(255,51,51,0.2);}
.dt-card.flip{animation:dt-flip .4s ease;}
@keyframes dt-flip{0%{transform:rotateY(90deg);opacity:0;}100%{transform:rotateY(0);opacity:1;}}
.dt-rank{font-size:24px;font-weight:700;font-family:'Noto Serif',serif;line-height:1;}
.dt-suit{font-size:18px;}
.dt-corner{position:absolute;top:5px;left:7px;font-size:10px;font-weight:700;font-family:'Noto Serif',serif;line-height:1.1;}

/* CARD VALUE BADGE */
.card-value-badge{font-size:10px;font-weight:700;font-family:monospace;margin-top:4px;}
.dragon-side .card-value-badge{color:var(--dragon);}
.tiger-side .card-value-badge{color:var(--tiger);}

/* WIN GLOW */
.side.winner{animation:side-win .5s ease;}
@keyframes side-win{0%,100%{background-color:transparent;}40%{background-color:rgba(255,215,0,0.1);}}
.dragon-side.winner{animation:dragon-win .5s ease;}
@keyframes dragon-win{0%,100%{background-color:rgba(255,51,51,0.06);}40%{background-color:rgba(255,51,51,0.2);}}

/* BET BUTTONS */
.bet-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.bet-side-btn{padding:14px 8px;border-radius:14px;border:2px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;text-align:center;transition:all .2s;}
.bet-side-btn .bsb-icon{font-size:24px;margin-bottom:4px;}
.bet-side-btn .bsb-name{font-size:9px;font-weight:700;letter-spacing:1px;margin-bottom:2px;}
.bet-side-btn .bsb-odds{font-size:8px;color:#3a2a1a;}
.bet-side-btn.dragon{border-color:rgba(255,51,51,0.2);}
.bet-side-btn.dragon:hover,.bet-side-btn.dragon.sel{border-color:var(--dragon);background:rgba(255,51,51,0.1);box-shadow:0 0 20px rgba(255,51,51,0.15);}
.bet-side-btn.dragon .bsb-name{color:var(--dragon);}
.bet-side-btn.tiger{border-color:rgba(255,215,0,0.2);}
.bet-side-btn.tiger:hover,.bet-side-btn.tiger.sel{border-color:var(--tiger);background:rgba(255,215,0,0.08);}
.bet-side-btn.tiger .bsb-name{color:var(--tiger);}
.bet-side-btn.tie{border-color:rgba(34,197,94,0.2);}
.bet-side-btn.tie:hover,.bet-side-btn.tie.sel{border-color:var(--tie);background:rgba(34,197,94,0.08);}
.bet-side-btn.tie .bsb-name{color:var(--tie);}

/* RESULT */
.result-area{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.ra-main{font-size:14px;font-weight:900;letter-spacing:2px;}
.ra-main.win{color:var(--tiger);}
.ra-main.lose{color:#3a2a1a;}
.ra-main.tie{color:var(--tie);}
.ra-main.idle{color:#2a1a1a;}
.ra-sub{font-size:9px;color:#2a1a1a;letter-spacing:1px;}

/* BET AMOUNT + DEAL */
.bet-ctrl{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.06);border-radius:14px;padding:14px;margin-bottom:14px;}
.bl{font-size:8px;color:#3a2a1a;letter-spacing:2px;margin-bottom:8px;}
.bamount-row{display:flex;gap:8px;margin-bottom:8px;}
.bet-inp{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(255,215,0,0.1);border-radius:8px;padding:10px 12px;color:#e8d8c8;font-family:var(--font);font-size:13px;font-weight:700;outline:none;text-align:center;}
.bet-inp:focus{border-color:rgba(255,215,0,0.3);}
.adj{padding:10px 14px;background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.08);border-radius:8px;color:#3a2a1a;font-family:var(--font);font-size:11px;cursor:pointer;transition:all .15s;}
.adj:hover{color:var(--tiger);}
.qrow{display:flex;gap:5px;}
.qb{flex:1;padding:7px 3px;background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.08);border-radius:6px;color:#3a2a1a;font-size:8px;letter-spacing:1px;cursor:pointer;text-align:center;transition:all .15s;}
.qb:hover{border-color:var(--tiger);color:var(--tiger);}
.btn-deal{width:100%;padding:16px;border:none;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:900;letter-spacing:3px;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#aa4400,var(--tiger));color:#080408;box-shadow:0 4px 20px rgba(255,215,0,0.3);}
.btn-deal:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(255,215,0,0.5);}
.btn-deal:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px;}
.stt{background:rgba(255,215,0,0.03);border:1px solid rgba(255,215,0,0.06);border-radius:10px;padding:8px;text-align:center;}
.stt .sv{font-size:12px;font-weight:700;color:var(--tiger);font-family:monospace;}
.stt .sl{font-size:8px;color:#3a2a1a;letter-spacing:1px;margin-top:2px;}

#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:200;}
#flash.win{background:radial-gradient(ellipse at 50% 30%,rgba(255,215,0,0.25),transparent 70%);}
#flash.tie{background:radial-gradient(ellipse at 50% 30%,rgba(34,197,94,0.2),transparent 70%);}
#flash.show{animation:fl .5s ease;}
@keyframes fl{0%,100%{opacity:0;}30%{opacity:1;}}
</style>
</head>
<body>
<div id="flash"></div>
<header class="hdr">
  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>
  <span class="title">🐉 DRAGON TIGER</span>
  <span class="bal" id="balDisplay">$—</span>
</header>
<div class="page">
  <div class="arena">
    <div class="dragon-side side" id="dragonSide">
      <div class="faction-icon">🐉</div>
      <div class="faction-name">DRAGON</div>
      <div class="card-slot empty" id="dragonSlot"><span style="font-size:28px;opacity:.15;">🂠</span></div>
      <div class="card-value-badge" id="dragonVal"></div>
    </div>
    <div class="vs-col"><div class="vs-pipe"></div><div class="vs-text">VS</div><div class="vs-pipe"></div></div>
    <div class="tiger-side side" id="tigerSide">
      <div class="faction-icon">🐯</div>
      <div class="faction-name">TIGER</div>
      <div class="card-slot empty" id="tigerSlot"><span style="font-size:28px;opacity:.15;">🂠</span></div>
      <div class="card-value-badge" id="tigerVal"></div>
    </div>
  </div>

  <div class="bet-row">
    <div class="bet-side-btn dragon" id="btnDragon" onclick="setBetSide('dragon')">
      <div class="bsb-icon">🐉</div><div class="bsb-name">DRAGON</div><div class="bsb-odds">2× PAYOUT</div>
    </div>
    <div class="bet-side-btn tie" id="btnTie" onclick="setBetSide('tie')">
      <div class="bsb-icon">⚖️</div><div class="bsb-name">TIE</div><div class="bsb-odds">9× PAYOUT</div>
    </div>
    <div class="bet-side-btn tiger" id="btnTiger" onclick="setBetSide('tiger')">
      <div class="bsb-icon">🐯</div><div class="bsb-name">TIGER</div><div class="bsb-odds">2× PAYOUT</div>
    </div>
  </div>

  <div class="result-area">
    <div class="ra-main idle" id="raMain">PICK DRAGON, TIGER, OR TIE</div>
    <div class="ra-sub" id="raSub">TIE PAYS 9:1 · SIDE BETS PUSH ON TIE</div>
  </div>

  <div class="bet-ctrl">
    <div class="bl">BET AMOUNT</div>
    <div class="bamount-row">
      <button class="adj" onclick="halveBet()">½</button>
      <input class="bet-inp" id="betInp" type="number" value="500" min="50">
      <button class="adj" onclick="doubleBet()">2×</button>
    </div>
    <div class="qrow" style="margin-bottom:10px;">
      <div class="qb" onclick="qb(100)">$100</div><div class="qb" onclick="qb(500)">$500</div>
      <div class="qb" onclick="qb(1000)">$1K</div><div class="qb" onclick="qb(5000)">$5K</div><div class="qb" onclick="qb(10000)">$10K</div>
    </div>
    <button class="btn-deal" id="dealBtn" onclick="deal()" disabled>SELECT A SIDE FIRST</button>
  </div>

  <div class="stats">
    <div class="stt"><div class="sv" id="stW">0</div><div class="sl">WINS</div></div>
    <div class="stt"><div class="sv" id="stL">0</div><div class="sl">LOSSES</div></div>
    <div class="stt"><div class="sv" id="stProfit">$0</div><div class="sl">PROFIT</div></div>
  </div>
</div>
<script>
const RED_SUITS=['♥','♦'];
let betSide=null,balance=0,dealing=false,wins=0,losses=0,profit=0;
async function init(){try{const d=await api('/api/user/me');balance=d.balance;updateBal();}catch(e){}}
function updateBal(){document.getElementById('balDisplay').textContent='$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});}
function setBetSide(side){
  betSide=side;
  // Clear all selections first
  document.querySelectorAll('.bet-side-btn').forEach(b=>b.classList.remove('sel'));
  // Set the selected one - map side names to element IDs
  const idMap={dragon:'btnDragon',tie:'btnTie',tiger:'btnTiger'};
  const el=document.getElementById(idMap[side]);
  if(el) el.classList.add('sel');
  const btn=document.getElementById('dealBtn');
  btn.disabled=false;
  btn.textContent='🎴 DEAL — '+side.toUpperCase();
}
function qb(v){document.getElementById('betInp').value=v;}
function halveBet(){document.getElementById('betInp').value=Math.max(50,Math.floor(parseInt(document.getElementById('betInp').value||500)/2));}
function doubleBet(){document.getElementById('betInp').value=Math.min(balance,parseInt(document.getElementById('betInp').value||500)*2);}
async function deal(){
  if(!betSide||dealing) return;
  const bet=parseInt(document.getElementById('betInp').value)||500;
  if(bet>balance) return;
  dealing=true;document.getElementById('dealBtn').disabled=true;
  resetCards();setResult('DEALING…','idle');
  try{
    const d=await api('/api/games/easy/dragon-tiger',{method:'POST',body:JSON.stringify({amount:bet,bet_on:betSide})});
    await delay(400);
    renderDTCard('dragonSlot',d.dragon,true);
    // Show the baccarat-style card value (A=1, 2-10 face value, J/Q/K=0)
    const dragonDisplay = d.dragon.rank === 'A' ? 'ACE' : d.dragon.display;
    document.getElementById('dragonVal').textContent='VALUE: '+d.dragon.rank;
    await delay(300);
    renderDTCard('tigerSlot',d.tiger,true);
    const tigerDisplay = d.tiger.rank === 'A' ? 'ACE' : d.tiger.display;
    document.getElementById('tigerVal').textContent='VALUE: '+d.tiger.rank;
    await delay(500);
    balance=await refreshBal();updateBal();
    const isTie=(d.outcome==='tie');
    if(isTie && betSide==='tie'){
      setResult('⚖️ TIE — YOU WIN 9× · +$'+d.win.toLocaleString(undefined,{maximumFractionDigits:0}),'tie');
      flashOv('tie');wins++;profit+=d.win-bet;
    }else if(!isTie && d.outcome===betSide){
      // We bet correctly on dragon or tiger
      setResult('✅ '+d.outcome.toUpperCase()+' WINS — +$'+(d.win-bet).toLocaleString(undefined,{maximumFractionDigits:0}),'win');
      flashOv('win');wins++;profit+=d.win-bet;
      const sideEl=document.getElementById(d.outcome+'Side');
      if(sideEl) sideEl.classList.add('winner');
    }else if(d.tie_push){
      setResult('⚖️ TIE — BET RETURNED (PUSH)','tie');
    }else{
      setResult('❌ '+d.outcome.toUpperCase()+' WINS — LOST $'+bet.toLocaleString(),'lose');
      losses++;profit-=bet;
    }
    document.getElementById('raSub').textContent='Dragon: '+d.dragon.display+' · Tiger: '+d.tiger.display;
    document.getElementById('stW').textContent=wins;
    document.getElementById('stL').textContent=losses;
    document.getElementById('stProfit').textContent=(profit>=0?'+':'')+profit.toLocaleString(undefined,{maximumFractionDigits:0});
  }catch(e){setResult('ERROR: '+e.message,'idle');}
  finally{dealing=false;document.getElementById('dealBtn').disabled=false;}
}
function renderDTCard(slotId,card,animate){
  const slot=document.getElementById(slotId);const isRed=RED_SUITS.includes(card.suit);
  slot.innerHTML='';const c=document.createElement('div');
  c.className='dt-card face'+(isRed?' face-red':'')+(animate?' flip':'');
  c.innerHTML='<div class="dt-corner">'+card.rank+'<br>'+card.suit+'</div><div class="dt-rank">'+card.rank+'</div><div class="dt-suit">'+card.suit+'</div>';
  slot.appendChild(c);slot.className='card-slot';
}
function resetCards(){
  ['dragon','tiger'].forEach(s=>{
    const slot=document.getElementById(s+'Slot');slot.className='card-slot empty';
    slot.innerHTML='<span style="font-size:28px;opacity:.15;">🂠</span>';
    document.getElementById(s+'Val').textContent='';
    document.getElementById(s+'Side').classList.remove('winner');
  });
}
function setResult(text,cls){const el=document.getElementById('raMain');el.className='ra-main '+cls;el.textContent=text;}
function flashOv(type){const el=document.getElementById('flash');el.className=type;void el.offsetWidth;el.classList.add('show');}
async function refreshBal(){try{const d=await api('/api/user/me');return d.balance;}catch(e){return balance;}}
async function api(url,opts={}){const r=await fetch(url,{credentials:'include',headers:{'Content-Type':'application/json'},...opts});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Error');}return r.json();}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
init();
</script>
</body>
</html>
